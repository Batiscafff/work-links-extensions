<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meet Links</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="viewport">

    <!-- ── Вид: список ── -->
    <div class="view" id="viewList">
      <header class="header">
        <img class="header-icon" src="icons/logo_cropped.png" alt="Meet Links" />
        <span class="header-title">Meet Links</span>
        <button class="btn-icon btn-search" id="btnSearch" title="Поиск">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="btn-icon btn-add-round" id="btnOpenAdd" title="Добавить конференцию">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="btn-icon theme-toggle" id="themeToggle" title="Переключить тему"></button>
      </header>

      <div class="search-bar" id="searchBar">
        <input type="text" id="searchInput" class="search-input"
          placeholder="Поиск по названию..." autocomplete="off" />
      </div>

      <div class="list-container" id="linkList"></div>
    </div>

    <!-- ── Вид: добавление ── -->
    <div class="view" id="viewAdd">
      <header class="header">
        <button class="btn-icon btn-back" id="btnBack" title="Назад">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="header-title" id="addViewTitle">Новая конференция</span>
      </header>

      <div class="add-body">
        <div class="form-group">
          <input
            type="text"
            id="inputName"
            class="form-input"
            placeholder="Название конференции"
            maxlength="60"
            autocomplete="off"
          />
        </div>
        <div class="form-group">
          <input
            type="url"
            id="inputUrl"
            class="form-input"
            placeholder="https://meet.google.com/xxx-xxxx-xxx"
            autocomplete="off"
          />
          <span class="form-error" id="urlError"></span>
        </div>
        <button class="btn-add" id="btnSave">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          <span id="btnSaveLabel">Добавить</span>
        </button>
      </div>
    </div>

  </div>
  <!-- ── Вид: профиль ── -->
  <div class="view" id="viewProfile">
    <header class="header">
      <button class="btn-icon btn-back" id="btnProfileBack" title="Назад">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="header-title" id="profileTitle"></span>
      <button class="btn-icon" id="profileEdit" title="Редактировать" style="margin-left:auto">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <div class="profile-body">
      <div class="profile-hero">
        <div class="profile-avatar" id="profileAvatar"></div>
        <p class="profile-name" id="profileName"></p>
        <p class="profile-url"  id="profileUrl"></p>
        <div class="profile-btns">
          <button class="btn-profile-open" id="profileOpenHere">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Эта вкладка
          </button>
          <button class="btn-profile-open" id="profileOpenNew">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="15 3 21 3 21 9" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="2"
                stroke-linecap="round"/>
            </svg>
            Новая вкладка
          </button>
        </div>
      </div>

      <div class="profile-notes-section">
        <span class="profile-notes-label">Заметки</span>
        <div class="notes-add-form">
          <textarea class="notes-add-input" id="noteInput"
            placeholder="Новая заметка..." rows="2"></textarea>
          <div class="notes-add-footer">
            <span class="notes-add-hint">Ctrl+Enter для добавления</span>
            <button class="btn-note-add" id="btnAddNote">Добавить</button>
          </div>
        </div>
        <div class="notes-list" id="notesList"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
